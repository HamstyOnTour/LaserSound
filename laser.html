<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>PKAP Laser-Generator</title>
  <style>
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      padding: 40px; 
      background: #1e1e1e; 
      color: #eaeaea; 
      text-align: center; 
      max-width: 600px;
      margin: 0 auto;
    }
    h2 { color: #4CAF50; }
    .control-group {
      background: #2a2a2a;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: left;
    }
    .slider-row {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
    }
    .slider-row label {
      margin-bottom: 5px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
    }
    input[type=range] {
      width: 100%;
      cursor: pointer;
    }
    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    button { 
      padding: 15px 25px; 
      font-size: 16px; 
      font-weight: bold;
      border: none; 
      border-radius: 5px; 
      cursor: pointer; 
      transition: background 0.2s;
    }
    #playBtn { background: #2196F3; color: white; }
    #playBtn:hover { background: #1976D2; }
    #downloadBtn { background: #4CAF50; color: white; }
    #downloadBtn:hover { background: #388E3C; }
  </style>
</head>
<body>

  <h2>Laser Sound Generator</h2>
  <p>Adjust the values, listen to the burst, and download the finished .wav file.</p>

  <div class="control-group">
    <div class="slider-row">
      <label>Startfrequenz: <span id="startFreqVal">1500 Hz</span></label>
      <input type="range" id="startFreq" min="200" max="4000" step="10" value="1500" oninput="document.getElementById('startFreqVal').innerText = this.value + ' Hz'">
    </div>
    
    <div class="slider-row">
      <label>Endfrequenz: <span id="endFreqVal">80 Hz</span></label>
      <input type="range" id="endFreq" min="20" max="1000" step="10" value="80" oninput="document.getElementById('endFreqVal').innerText = this.value + ' Hz'">
    </div>

    <div class="slider-row">
      <label>Dauer Einzelschuss: <span id="durationVal">0.12 Sek</span></label>
      <input type="range" id="duration" min="0.05" max="0.5" step="0.01" value="0.12" oninput="document.getElementById('durationVal').innerText = this.value + ' Sek'">
    </div>

    <div class="slider-row">
      <label>Abstand zwischen Kugeln: <span id="intervalVal">0.15 Sek</span></label>
      <input type="range" id="interval" min="0.05" max="1.0" step="0.01" value="0.15" oninput="document.getElementById('intervalVal').innerText = this.value + ' Sek'">
    </div>

    <div class="slider-row">
      <label>Anzahl der Kugeln: <span id="countVal">5</span></label>
      <input type="range" id="count" min="1" max="20" step="1" value="5" oninput="document.getElementById('countVal').innerText = this.value">
    </div>
  </div>

  <div class="button-group">
    <button id="playBtn">▶ Test</button>
    <button id="downloadBtn">↓ Download</button>
  </div>

  <script>
    let audioCtx = null;

    function getParams() {
      return {
        start: parseFloat(document.getElementById('startFreq').value),
        end: parseFloat(document.getElementById('endFreq').value),
        dur: parseFloat(document.getElementById('duration').value),
        int: parseFloat(document.getElementById('interval').value),
        cnt: parseInt(document.getElementById('count').value)
      };
    }

    function scheduleLasers(context, startTime, params) {
      for(let i = 0; i < params.cnt; i++) {
        let t = startTime + (i * params.int);
        let osc = context.createOscillator();
        let gain = context.createGain();
        
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(params.start, t);
        osc.frequency.exponentialRampToValueAtTime(params.end, t + params.dur);
        
        gain.gain.setValueAtTime(0.5, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + params.dur);
        
        osc.connect(gain);
        gain.connect(context.destination);
        osc.start(t);
        osc.stop(t + params.dur);
      }
    }

    document.getElementById('playBtn').onclick = () => {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      const p = getParams();
      scheduleLasers(audioCtx, audioCtx.currentTime, p);
    };

    document.getElementById('downloadBtn').onclick = async () => {
      const p = getParams();
      const totalTime = (p.cnt - 1) * p.int + p.dur + 0.1; 
      const offlineCtx = new OfflineAudioContext(1, 44100 * totalTime, 44100);
      
      scheduleLasers(offlineCtx, 0, p);
      
      const buffer = await offlineCtx.startRendering();
      const wav = audioBufferToWav(buffer);
      const blob = new Blob([new DataView(wav)], { type: 'audio/wav' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      
      a.style.display = 'none';
      a.href = url;
      a.download = 'custom_laser.wav';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => document.body.removeChild(a), 100);
    };

    function audioBufferToWav(buffer) {
      let result = new Float32Array(buffer.length);
      buffer.copyFromChannel(result, 0);
      let data = new DataView(new ArrayBuffer(44 + result.length * 2));
      let writeString = (view, offset, string) => { for(let i=0; i<string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };
      
      writeString(data, 0, 'RIFF');
      data.setUint32(4, 36 + result.length * 2, true);
      writeString(data, 8, 'WAVE');
      writeString(data, 12, 'fmt ');
      data.setUint32(16, 16, true);
      data.setUint16(20, 1, true); 
      data.setUint16(22, 1, true); 
      data.setUint32(24, 44100, true); 
      data.setUint32(28, 44100 * 2, true); 
      data.setUint16(32, 2, true); 
      data.setUint16(34, 16, true); 
      writeString(data, 36, 'data');
      data.setUint32(40, result.length * 2, true);
      
      let offset = 44;
      for(let i = 0; i < result.length; i++) {
        let s = Math.max(-1, Math.min(1, result[i]));
        data.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        offset += 2;
      }
      return data.buffer;
    }
  </script>
</body>
</html>
